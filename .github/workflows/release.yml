name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-core:
    name: build + attach core binary (macOS 26)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Build (release, stripped) + package
        run: |
          swift build -c release -Xlinker -s
          BIN=.build/release/macvis
          TARBALL="macvis-${GITHUB_REF_NAME}-macos-arm64.tar.gz"
          mkdir -p dist
          tar -C "$(dirname "$BIN")" -czf "dist/${TARBALL}" "$(basename "$BIN")"
          ( cd dist && shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256" )

      - name: Publish release (core binary)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            ## macvis ${{ github.ref_name }}

            Apple Silicon, macOS 26+. Install:

            ```
            brew install junmo-kim/tap/macvis
            mise use -g github:junmo-kim/mac-local-vision
            ```

            Or download `macvis-${{ github.ref_name }}-macos-arm64.tar.gz` below and verify it
            with the matching `.sha256`. `ask` (Beta) lights up on macOS 27 + Apple Intelligence;
            everything else runs on macOS 26+.
