name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-core:
    name: build + attach core binary (macOS 26)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6'

      - name: Build (release, stripped) + package
        run: |
          swift build -c release -Xlinker -s
          BIN=.build/release/macvis
          TARBALL="macvis-${GITHUB_REF_NAME}-macos-arm64.tar.gz"
          mkdir -p dist
          tar -C "$(dirname "$BIN")" -czf "dist/${TARBALL}" "$(basename "$BIN")"
          ( cd dist && shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256" )

      - name: Generate release notes
        run: scripts/gen-release-notes.sh "${GITHUB_REF_NAME}" > "${RUNNER_TEMP}/RELEASE_NOTES.md"

      - name: Publish release (core binary)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          body_path: ${{ runner.temp }}/RELEASE_NOTES.md
