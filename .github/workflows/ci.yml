name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (macOS 26 · core)
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Versions
        run: swift --version && xcodebuild -version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Release notes generator smoke test
        run: |
          LATEST_TAG="$(git tag --sort=-v:refname | head -1)"
          if [ -z "$LATEST_TAG" ]; then
            echo "no tags yet — skipping"
          else
            OUT="$(scripts/gen-release-notes.sh "$LATEST_TAG")"
            echo "$OUT"
            echo "$OUT" | grep -qE "^## macvis ${LATEST_TAG}\$" || { echo "::error::missing title heading"; exit 1; }
            echo "$OUT" | grep -q "What's Changed" || { echo "::error::missing What's Changed section"; exit 1; }
          fi

      - name: Release notes generator — decoy heading regression test
        run: |
          # Regression guard for a real bug: the keynote matcher must reject a
          # near-miss CHANGELOG heading (e.g. "## v0X2X0" vs tag "v0.2.0"), not
          # treat "." as an ERE wildcard and leak the wrong section.
          TMPD="$(mktemp -d)"
          mkdir -p "$TMPD/scripts"
          cp scripts/gen-release-notes.sh "$TMPD/scripts/"
          git -C "$TMPD" init -q
          git -C "$TMPD" config user.email t@t.com
          git -C "$TMPD" config user.name t
          ( cd "$TMPD" && echo x > f.txt && git add f.txt && git commit -qm "feat: initial" && git tag v0.2.0 )
          printf '# Changelog\n\n## v0X2X0\n\nDECOY\n' > "$TMPD/CHANGELOG.md"
          OUT="$(cd "$TMPD" && bash scripts/gen-release-notes.sh v0.2.0)"
          rm -rf "$TMPD"
          echo "$OUT" | grep -q "DECOY" && { echo "::error::keynote matcher leaked a non-matching CHANGELOG heading"; exit 1; }
          echo "ok: decoy heading correctly rejected"

      - name: Privacy guard (stay on-device — no networking APIs)
        run: |
          # HTTPServer.swift is the sole intentional user of Network.framework APIs.
          # The pattern below bans a named subset of networking symbols everywhere else;
          # it does not claim to be exhaustive — the list covers the most common Apple
          # and POSIX networking entry points that would indicate unintended network access.
          if grep -rInE 'URLSession|URLRequest|NWConnection|NWListener|NWPath|NWBrowser|NWEndpoint|NWParameters|import Network([^A-Za-z]|$)|getaddrinfo|CFSocket|dataTask|downloadTask' Sources/ \
              | grep -v 'Sources/macvis/HTTPServer\.swift:'; then
            echo "::error::a networking API appears in Sources/ — macvis must stay fully on-device"; exit 1
          fi
          echo "ok: no networking APIs outside HTTPServer.swift"

      # NOTE: the `ask` multimodal path (-D MACVIS_ASK_IMAGE) needs the macOS 27 SDK
      # (Xcode 27 beta), which GitHub-hosted runners don't ship yet
      # (actions/runner-images#14196). It is built and released manually until then —
      # see scripts/release-ask.sh. When Xcode 27 lands on the runners, add a second
      # job here: `swift build -c release -Xswiftc -DMACVIS_ASK_IMAGE`.
